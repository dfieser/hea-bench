name: Publish to PyPI

# Builds and uploads the package to PyPI when the version in
# pyproject.toml changes on main. "skip-existing" makes this safe to
# re-run: any file already on PyPI is skipped and the job still passes,
# so a push that does not bump the version uploads nothing rather than
# failing on a duplicate.
#
# First publish, or any on-demand publish: add the repository secret
# PYPI_API_TOKEN, then run this workflow from the Actions tab with the
# "Run workflow" button. CI runs in parallel on every push to main, so
# the released code is still exercised by the full test suite.

on:
  push:
    branches: [main]
    paths: ["pyproject.toml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
