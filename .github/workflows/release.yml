name: Release

# One tag-driven, fully hands-off release pipeline. Cutting a release is:
#
#   python tools/version.py --set X.Y.Z
#   (write the CHANGELOG.md section + the web/index.html VERSION_HISTORY entry)
#   git commit -am "Release vX.Y.Z"
#   git tag vX.Y.Z && git push --follow-tags
#
# Job graph (--> = "needs"):
#   guard ----.
#   gate  ----+--> pypi --> mcp                 (mcp publishes the registry)
#             |        `--> release             (creates the Release; fires Zenodo)
#             `--> desktop-build                (compiles the exe in parallel)
#   desktop-attach <-- (desktop-build, release) (uploads the exe to the Release)
#
# The Release (and therefore the Zenodo DOI) depends ONLY on PyPI, so a flaky
# MCP-registry publish never blocks archival. The slow Windows build runs in
# parallel with pypi/mcp and only its tiny upload waits for the Release.
#
# See RELEASING.md for the one-time setup (PyPI Trusted Publisher + the `pypi`
# environment) and the full runbook.

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Refuse a run that is not from a vX.Y.Z tag. workflow_dispatch defaults to a
  # branch ref, from which every job would derive a bogus version; fail fast
  # with a clear message instead.
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Only release from a vX.Y.Z tag
        run: |
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "::error::Run release.yml from a vX.Y.Z tag ref, not ${GITHUB_REF_NAME}."
            exit 1
          fi

  # Full test matrix (pytest 3.10-3.12 + JS parity) + the version-consistency
  # drift-check on the tagged commit.
  gate:
    uses: ./.github/workflows/ci.yml

  pypi:
    needs: [guard, gate]
    runs-on: ubuntu-latest
    environment: pypi        # must match the PyPI trusted-publisher config
    permissions:
      id-token: write        # OIDC mints a short-lived token; no PYPI_API_TOKEN
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Built artifacts must match the tag
        run: |
          v="${GITHUB_REF_NAME#v}"
          ls "dist/hea_bench-${v}.tar.gz" "dist/hea_bench-${v}-py3-none-any.whl"
      - name: Publish to PyPI (Trusted Publishing, no username/password)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
      - name: Keep the built artifacts for the GitHub Release
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # Runs in parallel with `release`; a registry hiccup here does NOT block the
  # GitHub Release or the Zenodo DOI.
  mcp:
    needs: pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # OIDC login to the MCP registry (no secret)
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Wait until PyPI serves this version
        run: |
          v="${GITHUB_REF_NAME#v}"
          for i in $(seq 1 30); do
            if curl -fsSL "https://pypi.org/pypi/hea-bench/${v}/json" >/dev/null; then
              echo "PyPI is serving ${v}"; exit 0
            fi
            echo "waiting for PyPI to serve ${v} (attempt $i)"; sleep 10
          done
          echo "PyPI did not serve ${v} within 5 minutes"; exit 1
      - name: Install mcp-publisher
        run: |
          curl -fL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json to the MCP registry
        run: ./mcp-publisher publish

  # Compiles the exe in parallel with pypi/mcp; only the attach step below waits
  # for the Release to exist.
  desktop-build:
    needs: [guard, gate]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
      - name: Install the Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked
      - name: Build the portable executable (no installer)
        run: cargo tauri build --no-bundle
      - name: Stage the portable exe
        shell: pwsh
        run: Copy-Item "src-tauri/target/release/hea-bench.exe" "HEA-Bench.exe"
      - name: Keep the exe for the attach step
        uses: actions/upload-artifact@v7
        with:
          name: desktop
          path: HEA-Bench.exe

  # Depends only on PyPI: a GitHub Release does not need the MCP registry.
  # Creating the Release fires the GitHub<->Zenodo integration.
  release:
    needs: pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the Release and upload assets
    steps:
      - uses: actions/checkout@v7
      - name: Fetch the built artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Extract this version's changelog section as release notes
        run: |
          v="${GITHUB_REF_NAME#v}"
          awk -v ver="$v" '
            $0 ~ "^## \\[" ver "\\]" { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > NOTES.md
          if [ ! -s NOTES.md ]; then
            echo "No '## [${v}]' changelog section found; falling back to generated notes." >&2
            echo "Release ${GITHUB_REF_NAME}." > NOTES.md
          fi
          echo "--- release notes ---"; cat NOTES.md
      - name: Create the GitHub Release (fires the Zenodo webhook)
        uses: softprops/action-gh-release@v3
        with:
          body_path: NOTES.md
          generate_release_notes: true
          files: dist/*

  # Attach the exe once both the parallel build and the Release exist.
  desktop-attach:
    needs: [desktop-build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write        # upload the exe asset to this tag's release
    steps:
      - name: Fetch the built exe
        uses: actions/download-artifact@v8
        with:
          name: desktop
      - name: Attach the portable exe to this tag's release
        env:
          GH_TOKEN: ${{ github.token }}
        # --repo is required because this job does not check out the repo, so gh
        # cannot infer the target from a local git remote.
        run: gh release upload "${GITHUB_REF_NAME}" HEA-Bench.exe --clobber --repo "${{ github.repository }}"
