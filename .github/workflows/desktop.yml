name: Build desktop app

# Keeps the offline desktop app in sync with the single web page
# (web/index.html). On any change to the page or the Tauri wrapper on
# main, rebuild the portable Windows executable and re-attach it to the
# latest release as HEA-Bench.exe, so the download is always current.
#
# The build produces a single portable .exe (no installer): the user
# downloads it and runs it directly. Nothing to install, nothing to
# rebuild or track by hand.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "src-tauri/**"
      - ".github/workflows/desktop.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install the Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build the portable executable (no installer)
        run: cargo tauri build --no-bundle

      - name: Stage the portable exe at the repo root
        shell: pwsh
        run: Copy-Item "src-tauri/target/release/hea-bench.exe" "HEA-Bench.exe"

      - name: Attach to the latest release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = gh api "repos/${{ github.repository }}/releases/latest" --jq .tag_name
          gh release upload $tag HEA-Bench.exe --clobber
