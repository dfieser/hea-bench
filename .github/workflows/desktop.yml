name: Build desktop app

# Keeps the offline desktop installer in sync with the single web page
# (web/index.html). On any change to the page or the Tauri wrapper on
# main, rebuild the Windows installers and re-attach them to the latest
# release under their stable names, so the direct-download link always
# serves the current app. Nothing to rebuild or track by hand.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "src-tauri/**"
      - ".github/workflows/desktop.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install the Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build the desktop installers
        run: cargo tauri build

      - name: Collect installers at the repo root (stable names)
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          Copy-Item (Get-ChildItem "$bundle/nsis/*-setup.exe")[0].FullName "HEA-Bench-Setup-x64.exe"
          Copy-Item (Get-ChildItem "$bundle/msi/*.msi")[0].FullName "HEA-Bench-x64.msi"

      - name: Attach to the latest release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = gh api "repos/${{ github.repository }}/releases/latest" --jq .tag_name
          gh release upload $tag HEA-Bench-Setup-x64.exe HEA-Bench-x64.msi --clobber
