name: Publish to MCP Registry

# Lists the server in the public Model Context Protocol registry as
# io.github.dfieser/hea-bench. Authentication is GitHub OIDC (no secret,
# no manual login): the workflow runs in this repo, which proves the
# io.github.dfieser namespace. The registry verifies ownership of the
# PyPI package by the "mcp-name: io.github.dfieser/hea-bench" marker in
# the README (the PyPI description), so the package must already be
# published to PyPI at the version in server.json before this runs.
#
# Trigger on a version tag (vX.Y.Z) or manually from the Actions tab.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write   # required for GitHub OIDC authentication
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json to the MCP registry
        run: ./mcp-publisher publish
